name: "hyperliquid"

services:
  node:
    restart: unless-stopped
    build: .
    ports:
      - "4000-4010:4000-4010"
    volumes:
      - hl-data:/home/hluser/hl/data
      - ./visor.json:/home/hluser/visor.json

  pruner:
    restart: unless-stopped
    build: ./pruner
    volumes:
      - hl-data:/home/hluser/hl/data
      - ./override_gossip_config.json:/home/hluser/override_gossip_config.json

volumes:
  hl-data:
    driver: local
