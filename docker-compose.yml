name: "hyperliquid"

services:
  node:
    platform: linux/amd64
    restart: unless-stopped
    build: .
    ports:
      - "4000-4010:4000-4010"
    volumes:
      - /data/hyperliquid/hl-data:/data/hyperliquid/hl/data
      - /data/hyperliquid/tmp:/data/hyperliquid/tmp
      - /data/hyperliquid/hyperliquid_data:/data/hyperliquid/hyperliquid_data
      - /data/hyperliquid/file_mod_time_tracker:/data/hyperliquid/file_mod_time_tracker
      - ./override_gossip_config.json:/data/hyperliquid/override_gossip_config.json

  pruner:
    restart: unless-stopped
    build: ./pruner
    volumes:
      - /data/hyperliquid/hl-data:/data/hyperliquid/hl/data
